<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-button (click)="goBack()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-button>
    <ion-title slot="end">NEW POST</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="add-post-content">
  <div class="add-post-container">

    <div class="hero">
      <p class="hero-eyebrow">The Etiquette Society</p>
      <h1 class="hero-title">Create a new post</h1>
      <div class="hero-rule"></div>
    </div>

    <!-- Post type -->
    <div class="field-section">
      <p class="field-label">Post type</p>
      <div class="type-chips">
        <div class="type-chip"
             *ngFor="let t of postTypes"
             [class.active]="selectedType === t.value"
             (click)="selectedType = t.value">
          {{ t.label }}
        </div>
      </div>
    </div>

    <div class="divider-line">
      <span></span><ion-icon name="diamond-outline"></ion-icon><span></span>
    </div>

    <!-- Title -->
    <div class="field-section">
      <p class="field-label">Title <span class="optional">optional</span></p>
      <input class="field-input" [(ngModel)]="title" type="text" placeholder="Give your post a title..." />
    </div>

    <!-- Content -->
    <div class="field-section">
      <p class="field-label">Content <span class="required">*</span></p>
      <textarea class="field-textarea" [(ngModel)]="content" placeholder="Write something..." rows="6"></textarea>
    </div>

    <!-- Image -->
    <div class="field-section">
      <p class="field-label">Image <span class="optional">optional</span></p>
      <div class="image-preview" *ngIf="imageUrl">
        <img [src]="imageUrl" />
        <button class="remove-image" (click)="removeImage()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>
      <button class="image-picker" *ngIf="!imageUrl" (click)="pickImage()">
        <ion-icon name="image-outline"></ion-icon>
        <span>Add an image</span>
      </button>
    </div>

    <!-- Error -->
    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- Submit -->
    <button class="submit-btn" (click)="submit()" [disabled]="!isValid || submitting">
      {{ submitting ? 'Publishing...' : 'Publish post' }}
    </button>

  </div>
</ion-content>
