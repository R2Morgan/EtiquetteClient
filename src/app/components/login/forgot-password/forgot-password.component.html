<div>
  <h2>Reset Password</h2>

  <ion-input
    type="email"
    fill="solid"
    label="Email"
    labelPlacement="floating"
    [(ngModel)]="email"
  ></ion-input>

  <ion-button
    (click)="sendReset()"
    [disabled]="!emailValid"
  >
    Send Reset Link
  </ion-button>

  <a routerLink="/login">Back to Login</a>
</div>
